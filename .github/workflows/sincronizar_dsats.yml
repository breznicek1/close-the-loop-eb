name: Sincronizar DSATs

on:
  schedule:
    # De hora em hora das 8h às 21h BRT (UTC-3), dias úteis
    - cron: '0 11 * * 1-5'
    - cron: '0 12 * * 1-5'
    - cron: '0 13 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '0 16 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '0 20 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

jobs:
  sincronizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install mysql-connector-python supabase

      - name: Rodar sincronização
        env:
          MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASS: ${{ secrets.MYSQL_PASS }}
          MYSQL_DB:   ${{ secrets.MYSQL_DB }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sincronizar_dsats.py
